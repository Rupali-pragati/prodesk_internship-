<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dev-Detective — search GitHub profiles, browse repositories, and compare developers in Battle Mode. Built with vanilla JavaScript and the GitHub REST API." />
  <title>Dev-Detective · GitHub Profile Explorer</title>

  <!-- Fonts: Space Mono (display/brand) + system stack for body via CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Skip link for keyboard/screen-reader users -->
  <a href="#main" class="skip-link">Skip to content</a>

  <!--HEADER-->
  <header class="site-header">
    <div class="wrap header-inner">
      <a href="index.html" class="brand" aria-label="Dev-Detective home">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" role="img" aria-hidden="true">
            <path d="M12 .5C5.65.5.5 5.65.5 12a11.5 11.5 0 0 0 7.86 10.92c.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.37-3.88-1.37-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.71.08-.71 1.17.08 1.79 1.2 1.79 1.2 1.04 1.79 2.73 1.27 3.4.97.1-.76.41-1.27.74-1.56-2.55-.29-5.24-1.28-5.24-5.68 0-1.26.45-2.28 1.19-3.08-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.24 2.76.12 3.05.74.8 1.18 1.82 1.18 3.08 0 4.41-2.69 5.38-5.25 5.67.42.36.79 1.07.79 2.16v3.2c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
          </svg>
        </span>
        <span class="brand-text">dev<span class="brand-accent">_</span>detective</span>
      </a>

      <div class="header-status" role="status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text">GitHub REST API</span>
      </div>
    </div>
  </header>

  <!--MAIN-->
  <main id="main" class="wrap main">

    <!-- Intro -->
    <section class="intro">
      <h1 class="intro-title">Investigate any developer.</h1>
      <p class="intro-sub">Search a GitHub username to inspect their profile and repositories, or switch to <strong>Battle Mode</strong> to compare two developers by total stars.</p>
    </section>

    <!-- Mode switch (Single / Battle) -->
    <div class="mode-switch" role="tablist" aria-label="Search mode">
      <button id="tabSingle" class="mode-btn is-active" role="tab" aria-selected="true" aria-controls="panelSingle" type="button">
        Single Search
      </button>
      <button id="tabBattle" class="mode-btn" role="tab" aria-selected="false" aria-controls="panelBattle" type="button">
        Battle Mode
      </button>
    </div>

    <!--Single Search Panel-->
    <section id="panelSingle" class="panel" role="tabpanel" aria-labelledby="tabSingle">
      <form id="singleForm" class="search-form" novalidate>
        <div class="field">
          <label for="singleInput" class="field-label">GitHub username</label>
          <div class="input-row">
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke-width="2" stroke-linecap="round"/></svg>
              <input
                id="singleInput" name="username" type="text" class="input"
                placeholder="e.g. torvalds" autocomplete="off" spellcheck="false"
                aria-describedby="singleError" />
            </div>
            <button type="submit" class="btn btn-primary">Search</button>
          </div>
          <p id="singleError" class="field-error" role="alert" aria-live="assertive"></p>
        </div>
      </form>
    </section>

    <!--Battle Panel -->
    <section id="panelBattle" class="panel is-hidden" role="tabpanel" aria-labelledby="tabBattle" hidden>
      <form id="battleForm" class="search-form" novalidate>
        <div class="battle-fields">
          <div class="field">
            <label for="battleInput1" class="field-label">Developer #1</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke-width="2" stroke-linecap="round"/></svg>
              <input id="battleInput1" name="user1" type="text" class="input" placeholder="First username" autocomplete="off" spellcheck="false" aria-describedby="battleError1" />
            </div>
            <p id="battleError1" class="field-error" role="alert" aria-live="assertive"></p>
          </div>

          <div class="battle-vs" aria-hidden="true">VS</div>

          <div class="field">
            <label for="battleInput2" class="field-label">Developer #2</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke-width="2" stroke-linecap="round"/></svg>
              <input id="battleInput2" name="user2" type="text" class="input" placeholder="Second username" autocomplete="off" spellcheck="false" aria-describedby="battleError2" />
            </div>
            <p id="battleError2" class="field-error" role="alert" aria-live="assertive"></p>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Compare developers</button>
      </form>
    </section>

    <!--RESULT REGION-->
    <!-- aria-live so state changes are announced to assistive tech -->
    <section id="result" class="result" aria-live="polite" aria-busy="false"></section>

  </main>

  <!-- FOOTER-->
  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span>Dev-Detective · Vanilla JS + GitHub REST API</span>
      <span>Fetch API · Async/Await · Promise.all()</span>
    </div>
  </footer>

  <!-- Scripts loaded as ES modules; script.js orchestrates the rest -->
  <script type="module" src="script.js"></script>
</body>
</html>
